name: Build ADHD
on:
  push:
    branches:
      - master

jobs:
  install-nix:
    runs-on: codeberg-medium
    steps:
      - name: Install Nix
        run: sh <(curl --proto '=https' --tlsv1.2 -L https://nixos.org/nix/install) --daemon
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: Build it
        run: nix build .
      - name: Stat it
        run: stat ./result/bin/adhd
      - name: Upload it
      - uses: actions/upload-artifact@v3
        with:
          name: adhd
          path: result/bin/adhd
